<main class="create-survey">
  <section class="create-survey__panel">
    <img class="create-survey__image" src="" alt="" />

    <div class="create-survey__topbar">
      <span class="create-survey__status">Draft</span>

      <button class="create-survey__close-button" type="button" aria-label="Close create survey">
        X
      </button>
    </div>

    <h1 class="create-survey__title">Create new survey</h1>

    <form class="create-survey__form">
      <div class="create-survey__field">
        <label class="create-survey__label" for="survey-title"> Survey title </label>

        <input
          class="create-survey__input"
          id="survey-title"
          type="text"
          name="survey-title"
          placeholder="e.g. Team Event Survey"
        />
      </div>

      <div class="create-survey__field">
        <label class="create-survey__label" for="survey-description"> Description </label>

        <textarea
          class="create-survey__textarea"
          id="survey-description"
          name="survey-description"
          rows="4"
          placeholder="Describe what your survey is about"
        ></textarea>
      </div>

      <div class="create-survey__row">
        <div class="create-survey__field">
          <label class="create-survey__label" for="survey-category"> Category </label>

          <select class="create-survey__select" id="survey-category" name="survey-category">
            <option value="">Select category</option>
            <option value="team-activities">Team activities</option>
            <option value="health">Health</option>
            <option value="gaming">Gaming</option>
            <option value="workplace">Workplace</option>
          </select>
        </div>

        <div class="create-survey__field">
          <label class="create-survey__label" for="survey-end-date"> Ends on </label>

          <input
            class="create-survey__input"
            id="survey-end-date"
            type="datetime-local"
            name="survey-end-date"
          />
        </div>
      </div>

      <fieldset class="create-question">
        <legend class="create-question__legend">Question 1</legend>

        <div class="create-question__field">
          <label class="create-question__label" for="question-title"> Question </label>

          <input
            class="create-question__input"
            id="question-title"
            type="text"
            name="question-title"
            placeholder="e.g. Which activity would you prefer?"
          />
        </div>

        <div class="create-question__answers">
          <div class="create-question__answer">
            <label class="create-question__label" for="answer-1"> Answer 1 </label>

            <input
              class="create-question__input"
              id="answer-1"
              type="text"
              name="answer-1"
              placeholder="e.g. Outdoor team event"
            />
          </div>

          <div class="create-question__answer">
            <label class="create-question__label" for="answer-2"> Answer 2 </label>

            <input
              class="create-question__input"
              id="answer-2"
              type="text"
              name="answer-2"
              placeholder="e.g. Creative workshop"
            />
          </div>

          <div class="create-question__answer">
            <label class="create-question__label" for="answer-3"> Answer 3 </label>

            <input
              class="create-question__input"
              id="answer-3"
              type="text"
              name="answer-3"
              placeholder="e.g. Team dinner"
            />
          </div>
        </div>

        <button class="create-question__add-answer" type="button">Add answer</button>
      </fieldset>

      <div class="create-survey__actions">
        <button class="create-survey__secondary-button" type="button">Add next question</button>

        <button class="create-survey__primary-button" type="submit">Publish</button>
      </div>
    </form>
  </section>
</main>
